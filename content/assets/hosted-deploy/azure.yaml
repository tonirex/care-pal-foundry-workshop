# azd configuration for the Care Pal hosted agent (Lab 5, Part B).
# This is a STARTING POINT. The supported, click-through path is the VS Code "Microsoft Foundry"
# toolkit (see README) — use this file if your team standardises on `azd`.
#
# Docs: https://learn.microsoft.com/azure/developer/azure-developer-cli/azd-schema
name: carepal-hosted-agent
metadata:
  template: carepal-hosted-agent@0.1

services:
  agent:
    project: ./src
    language: python
    # The host value for Foundry hosted agents depends on your toolkit/azd extension version.
    # The VS Code Microsoft Foundry toolkit sets this for you when you "Deploy to Microsoft Foundry".
    host: containerapp
